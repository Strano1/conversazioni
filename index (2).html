<script>
// Key helpers — available globally
window.getKey = function(){ return localStorage.getItem('cv_key') || ''; };

window.submitKey = function(){
  var k = document.getElementById('keyInp').value.trim();
  if(k.length < 10){
    document.getElementById('keyErr').style.display = 'block';
    return;
  }
  localStorage.setItem('cv_key', k);
  document.getElementById('setup').style.display = 'none';
  // mountApp is defined inside the Babel block — wait for it
  var tries = 0;
  var interval = setInterval(function(){
    tries++;
    if(typeof window.mountApp === 'function'){
      clearInterval(interval);
      window.mountApp();
    }
    if(tries > 200){ // 10 seconds max
      clearInterval(interval);
      document.getElementById('setup').style.display = 'flex';
      alert('App failed to load. Please refresh the page and try again.');
    }
  }, 50);
};

// On page load — show setup screen always, pre-fill key if saved
document.addEventListener('DOMContentLoaded', function(){
  var k = window.getKey();
  if(k) document.getElementById('keyInp').value = k;
  // Always show setup screen first — user confirms key then app loads
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('keyInp').addEventListener('keydown', function(e){
    if(e.key === 'Enter') window.submitKey();
  });
});
</script>

const S={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

// ─── GEMINI API ───────────────────────────────────────────────────────
async function ask(messages, system, maxTokens=1500){
  const key=window.getKey();
  if(!key){location.reload();return '';}

  // Build Gemini-format contents (alternating user/model)
  const raw=messages.map(m=>({
    role:(m.role==='assistant'||m.role==='model')?'model':'user',
    parts:[{text:String(m.content||'')}]
  }));
  const contents=[];
  for(const m of raw){
    if(contents.length&&contents[contents.length-1].role===m.role){
      contents[contents.length-1].parts[0].text+='\n'+m.parts[0].text;
    } else {
      contents.push({role:m.role,parts:[{text:m.parts[0].text}]});
    }
  }
  if(!contents.length||contents[0].role==='model')
    contents.unshift({role:'user',parts:[{text:'Hello'}]});

  const body={
    contents,
    generationConfig:{maxOutputTokens:Math.min(maxTokens,2048),temperature:0.7}
  };
  if(system) body.systemInstruction={parts:[{text:system}]};

  const ENDPOINT=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

  try{
    const r=await fetch(ENDPOINT,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const d=await r.json();
    if(!r.ok){
      const msg=d?.error?.message||'Unknown error';
      if(r.status===400||r.status===403){
        alert('API key problem: '+msg+'\n\nMake sure your key is from aistudio.google.com and has Gemini API enabled.');
        localStorage.removeItem('cv_key');location.reload();return '';
      }
      if(r.status===429) return '⚠ Rate limit — wait a moment and try again.';
      return '⚠ Error '+r.status+': '+msg;
    }
    const text=d?.candidates?.[0]?.content?.parts?.[0]?.text;
    if(!text){
      const reason=d?.candidates?.[0]?.finishReason;
      return reason==='SAFETY'?'⚠ Blocked by safety filter — try rephrasing.':'⚠ Empty response from Gemini.';
    }
    return text;
  }catch(e){
    // If fetch fails due to CORS (local file), tell user to use GitHub Pages
    if(e.message.includes('Failed to fetch')||e.message.includes('NetworkError')||e.message.includes('CORS')){
      return '⚠ CORS error: Please open this app via GitHub Pages, not as a local file. See setup instructions.';
    }
    return '⚠ Network error: '+e.message;
  }
}

// ─── SRS ──────────────────────────────────────────────────────────────
function nextSRS(q,reps,interval,ef){
  if(q<3)return{reps:0,interval:1,ef:Math.max(1.3,ef-0.2)};
  const nef=Math.max(1.3,ef+(0.1-(5-q)*(0.08+(5-q)*0.02)));
  const ni=reps===0?1:reps===1?6:Math.round(interval*nef);
  return{reps:reps+1,interval:ni,ef:nef};
}

.bbl.u{background:var(--gd);color:#0a0908;border-bottom-right-radius:4px;}

.peek-btn{background:var(--s4);border:1px solid var(--br2);border-radius:20px;padding:3px 10px;font-size:.7rem;color:var(--cr3);cursor:pointer;font-family:'Lato',sans-serif;transition:all .15s;}
.peek-btn:hover{border-color:var(--gd);color:var(--gd2);}
.peek-panel{background:var(--s3);border:1px solid var(--br2);border-left:3px solid var(--bl2);border-radius:0 7px 7px 0;padding:7px 10px;font-size:.82rem;color:var(--cr2);line-height:1.55;max-width:88%;white-space:pre-wrap;}

.chat-inp{flex:1;padding:8px 11px;border:1px solid var(--br2);border-radius:10px;font-family:'Lato',sans-serif;font-size:.88rem;background:var(--s3);color:var(--cr);outline:none;resize:none;min-height:40px;max-height:110px;line-height:1.5;}
.chat-inp:focus{border-color:var(--gd);}
.chat-inp::placeholder{color:var(--cr4);}

.mic-btn{width:72px;height:72px;border-radius:50%;font-size:2rem;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;background:var(--rs);margin:0 auto;transition:all .2s;}
.mic-btn.on{animation:rpl 1.2s infinite;box-shadow:0 0 0 0 rgba(184,72,40,.5);}

.pb-wrap{background:var(--s3);border-radius:20px;height:6px;overflow:hidden;}

/* Role-play */

/* Verb table */

/* Sentence mining */
.mine-card{background:var(--s3);border:1px solid var(--br);border-radius:8px;padding:13px;margin-bottom:8px;}
.mine-sent{font-size:.9rem;color:var(--cr);line-height:1.6;margin-bottom:5px;}
.mine-tl{font-size:.8rem;color:var(--cr4);font-style:italic;cursor:pointer;}

/* Listening */
.seg{padding:7px 0;border-bottom:1px solid var(--br);}

/* Accountability */
.ci-item{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--s3);border:1px solid var(--br);border-radius:8px;cursor:pointer;transition:all .15s;}

/* Modal */

.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--gd2);margin-bottom:4px;}

.lang-opt{display:flex;align-items:center;gap:7px;padding:8px 11px;background:var(--s3);border:1px solid var(--br2);border-radius:8px;cursor:pointer;font-size:.83rem;color:var(--cr3);transition:all .15s;}
.lang-opt:hover,.lang-opt.on{border-color:var(--gd);color:var(--gd2);background:rgba(200,144,58,.07);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:10px;}
`;

// ─── LANG MODAL ───────────────────────────────────────────────────────
function LangModal({lang,level,onSave}){
  const [l,setL]=useState(lang);
  const [lv,setLv]=useState(level);
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onSave(lang,level)}>
      <div className="modal">
        <h3>Language & Level</h3>
        <p style={{fontSize:'.78rem',color:'var(--cr4)',marginBottom:13}}>All tabs adapt to your choice.</p>
        <div className="lang-grid">
          {LANG_NAMES.map(n=><div key={n} className={`lang-opt${l===n?' on':''}`} onClick={()=>setL(n)}><span>{LANGS[n].flag}</span>{n}</div>)}
        </div>
        <div className="lbl" style={{marginBottom:7}}>Level</div>
        <div className="chips" style={{marginBottom:14}}>
          {['A1','A2','B1','B2','C1','C2'].map(v=><button key={v} className={`chip${lv===v?' on':''}`} onClick={()=>setLv(v)}>{v}</button>)}
        </div>
        <button className="btn btn-gd" style={{width:'100%'}} onClick={()=>onSave(l,lv)}>Confirm</button>
      </div>
    </div>
  );
}

// ─── CHAT TAB ─────────────────────────────────────────────────────────
function ChatTab({lang,level,onSave,addStat}){
  const cfg=LANGS[lang];
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState('');
  const [busy,setBusy]=useState(false);
  const [shown,setShown]=useState({});
  const endRef=useRef(null);

  useEffect(()=>{
    setMsgs([{r:'a',t:`${cfg.flag} Ready to practise ${lang}? Write to me in ${lang} — I'll reply naturally and correct any mistakes below your message. (${level})`,corr:null,tl:null,voc:null}]);
    setShown({});
  },[lang,level]);

  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs]);

  function sys(){
    return `You are a warm ${lang} conversation partner and language tutor. The learner's level is ${level}.
${cfg.rom?'Always include romanisation in parentheses after '+lang+' text.':''}
Cultural context: ${cfg.culture}

Reply to the learner's message using EXACTLY this structure — keep all four section headers:

CORRECTION: [In English: explain any grammar or vocabulary errors and give correct forms. If the message is perfect, write exactly: ✓ Perfect!]

REPLY:
[Your reply in ${lang} only — 2 to 4 natural sentences, end with a follow-up question to keep conversation going]

TRANSLATION:
[English translation of your REPLY]

VOCAB: [one interesting word or phrase from your reply] = [meaning and usage note in English — omit this entire line if nothing notable]`;
  }

  async function send(){
    if(!inp.trim()||busy)return;
    const txt=inp.trim();setInp('');setBusy(true);
    setMsgs(m=>[...m,{r:'u',t:txt,corr:null,tl:null,voc:null}]);
    const hist=msgs
      .filter(m=>m.t&&m.t.trim())
      .map(m=>({role:m.r==='a'?'assistant':'user',content:m.t}));
    hist.push({role:'user',content:txt});
    const raw=await ask(hist,sys(),1600);
    const cm=raw.match(/CORRECTION:\s*([\s\S]+?)(?=\n\nREPLY:)/);
    const rm=raw.match(/REPLY:\s*\n([\s\S]+?)(?=\n\nTRANSLATION:)/);
    const tlm=raw.match(/TRANSLATION:\s*\n([\s\S]+?)(?=\n\nVOCAB:|$)/s);
    const vm=raw.match(/VOCAB:\s*(.+?)(?=\n\n|$)/s);
    const corr=cm?cm[1].trim():null;
    const reply=rm?rm[1].trim():raw;
    const tl=tlm?tlm[1].trim():null;
    const voc=vm?vm[1].trim():null;
    setMsgs(m=>{
      const n=[...m,{r:'a',t:reply,corr:null,tl,voc}];
      if(corr&&!corr.startsWith('✓'))n[n.length-2]={...n[n.length-2],corr};
      return n;
    });
    if(corr&&!corr.startsWith('✓'))addStat('corrections');
    addStat('chatMsgs');
    setBusy(false);
  }

  const tog=(i,k)=>setShown(s=>({...s,[i]:{...s[i],[k]:!s[i]?.[k]}}));

  return(
    <div className="chat-wrap">
      <div className="chat-msgs">
        {msgs.map((m,i)=>(
          <div key={i} className="mwrap">
            <div className={`msg ${m.r}`}>
              <div className="mlbl">{m.r==='u'?'You':'Conversazioni'}</div>
              <div className={`bbl ${m.r}`}>{m.t}</div>
            </div>
            {m.r==='u'&&m.corr&&<div className="corr">{m.corr}</div>}
            {m.r==='a'&&(m.tl||m.voc)&&(
              <div className="peek-row">
                {m.tl&&<button className="peek-btn" onClick={()=>tog(i,'tl')}>{shown[i]?.tl?'▲ Hide':'🌐 Translation'}</button>}
                {m.voc&&<button className="peek-btn" onClick={()=>tog(i,'voc')}>{shown[i]?.voc?'▲ Hide':'📖 Vocab'}</button>}
              </div>
            )}
            {m.r==='a'&&m.tl&&shown[i]?.tl&&<div className="peek-panel">{m.tl}</div>}
            {m.r==='a'&&m.voc&&shown[i]?.voc&&(
              <div className="peek-panel vo">
                {m.voc}
                <button className="save-btn" onClick={()=>{const p=m.voc.split('=');onSave({target:p[0]?.trim(),meaning:p[1]?.trim()||'',context:m.t,lang});}}>＋ Save</button>
              </div>
            )}
          </div>
        ))}
        {busy&&<div className="msg a"><div className="mlbl">Conversazioni</div><div className="bbl a" style={{color:'var(--cr4)',fontStyle:'italic'}}>typing…</div></div>}
        <div ref={endRef}/>
      </div>
      <div className="chat-bar">
        <textarea className="chat-inp" value={inp} onChange={e=>setInp(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder={`Write in ${lang}… (Enter to send)`} rows={1}/>
        <button className="btn btn-gd" onClick={send} disabled={busy||!inp.trim()}>{busy?<span className="spin"/>:'Send'}</button>
      </div>
    </div>
  );
}

// ─── VOICE TAB ────────────────────────────────────────────────────────
function VoiceTab({lang,level,onSave,addStat}){
  const cfg=LANGS[lang];
  const [phrase,setPhrase]=useState('');
  const [loadingP,setLoadingP]=useState(false);
  const [rec,setRec]=useState(false);
  const [transcript,setTranscript]=useState('');
  const [feedback,setFeedback]=useState(null);
  const [busy,setBusy]=useState(false);
  const recRef=useRef(null);

  async function loadPhrase(){
    setLoadingP(true);setFeedback(null);setTranscript('');
    const r=await ask(
      [{role:'user',content:`Write ONE natural ${lang} sentence suitable for a ${level} learner to practise saying aloud. Output only the sentence itself, nothing else.${cfg.rom?' Include romanisation in parentheses after the sentence.':''}`}],
      `You are a ${lang} language teacher. Output a single practice sentence only.`,300
    );
    setPhrase(r.startsWith('⚠')?'Could not load — check your API key and try again.':r.trim());
    setLoadingP(false);
  }

  useEffect(()=>{loadPhrase();},[lang,level]);

  function speak(){
    if(!cfg.code||!window.speechSynthesis||!phrase)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(phrase);u.lang=cfg.code;u.rate=0.82;
    window.speechSynthesis.speak(u);
  }

  function startRec(){
    if(!cfg.code){alert(`Speech recognition not supported for ${lang} in this browser. Type your attempt below instead.`);return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Speech recognition requires Chrome. Type your attempt below.');return;}
    const r=new SR();r.lang=cfg.code;r.interimResults=false;
    r.onresult=e=>setTranscript(e.results[0][0].transcript);
    r.onend=()=>setRec(false);r.onerror=()=>setRec(false);
    recRef.current=r;r.start();setRec(true);setFeedback(null);
  }

  async function analyse(){
    setBusy(true);
    const sys=`You are an expert ${lang} pronunciation coach. Level: ${level}.
Pronunciation notes for ${lang}: ${cfg.pron}
${cfg.rom?'Include romanisation for all '+lang+' examples.':''}
The target phrase was: "${phrase}"
The learner said: "${transcript||'(unclear)'}"
Provide:
1. How accurately they matched the target
2. Specific sounds to improve (relevant to ${lang})
3. Intonation and rhythm notes
4. What they did well
5. A phonetic pronunciation guide for the target phrase (write it as approximate English sounds)`;
    const r=await ask([{role:'user',content:'Please analyse my pronunciation attempt.'}],sys,1000);
    setFeedback(r);addStat('voiceSessions');setBusy(false);
  }

  return(
    <div className="sec">
      <div className="card">
        <h3>Practice Phrase</h3>
        <div className="phrase-box" style={{marginBottom:11,minHeight:50,display:'flex',alignItems:'center',justifyContent:'center'}}>
          {loadingP?<span style={{color:'var(--cr4)',fontStyle:'normal'}}><span className="spin"/> Loading phrase…</span>:phrase||'—'}
        </div>
        <div className="row">
          <button className="btn btn-gh btn-sm" onClick={speak} disabled={!cfg.code||!phrase||loadingP}>🔊 Hear it</button>
          <button className="btn btn-gh btn-sm" onClick={loadPhrase} disabled={loadingP}>🔀 New phrase</button>
          {phrase&&<button className="save-btn" style={{marginLeft:'auto'}} onClick={()=>onSave({target:phrase,meaning:'',context:'Voice practice',lang})}>＋ Save</button>}
        </div>
        {!cfg.code&&<p className="note" style={{marginTop:7,color:'var(--rs3)'}}>Browser speech recognition not available for {lang} — type your attempt below.</p>}
      </div>
      <div className="card">
        <h3>Record Yourself</h3>
        <button className={`mic-btn${rec?' on':''}`} onClick={rec?()=>recRef.current?.stop():startRec}>{rec?'⏹':'🎙️'}</button>
        <p className="note" style={{textAlign:'center',marginTop:7}}>{rec?'Recording… tap to stop':'Tap the mic to record yourself saying the phrase'}</p>
        <textarea className="inp" style={{marginTop:11,minHeight:52}} value={transcript} onChange={e=>setTranscript(e.target.value)} placeholder="Transcript appears here, or type what you said…"/>
        <button className="btn btn-gd" style={{marginTop:9}} onClick={analyse} disabled={busy||!transcript.trim()||!phrase}>
          {busy?<><span className="spin"/> Analysing…</>:'Get Pronunciation Feedback'}
        </button>
      </div>
      {feedback&&<div className="fb gn">{feedback}</div>}
    </div>
  );
}

// ─── ROLE-PLAY TAB ────────────────────────────────────────────────────
function RolePlayTab({lang,level,addStat}){
  const cfg=LANGS[lang];
  const [scenario,setScenario]=useState('');
  const [myRole,setMyRole]=useState('');
  const [aiRole,setAiRole]=useState('');
  const [register,setRegister]=useState('natural for the scenario');
  const [active,setActive]=useState(false);
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState('');
  const [busy,setBusy]=useState(false);
  const [feedback,setFeedback]=useState(null);
  const endRef=useRef(null);

  const PRESETS=[
    {s:'Ordering at a restaurant',u:'Customer',a:'Waiter',r:'polite casual'},
    {s:'Buying train tickets',u:'Traveller',a:'Ticket agent',r:'neutral'},
    {s:'A job interview',u:'Applicant',a:'Interviewer',r:'formal'},
    {s:'Asking for directions',u:'Tourist',a:'Local',r:'friendly informal'},
    {s:'Doctor\'s appointment',u:'Patient',a:'Receptionist',r:'polite'},
    {s:'Negotiating at a market',u:'Shopper',a:'Vendor',r:'informal'},
    {s:'Returning a faulty item',u:'Customer',a:'Shop assistant',r:'polite assertive'},
    {s:'Meeting a new neighbour',u:'New resident',a:'Neighbour',r:'warm informal'},
  ];

  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs]);

  function getSys(){
    return `You are playing the role of: ${aiRole}. Scenario: ${scenario}. Language: ${lang}. Level: ${level}. Register: ${register}.
${cfg.rom?'Include romanisation in parentheses after each '+lang+' response.':''}
Stay fully in character as ${aiRole}. Reply ONLY in ${lang} (2–3 natural sentences).
After your reply, on a new line write:
HINT: [one grammar or vocabulary tip for the learner's last message in English, or "✓ Well expressed!" if it was correct]`;
  }

  function start(){
    if(!scenario||!myRole||!aiRole)return;
    setActive(true);setFeedback(null);setInp('');
    setMsgs([{r:'a',t:`[Scenario: ${scenario}. You are ${myRole}. I am ${aiRole}. Begin when ready — speak in ${lang}!]`,hint:null}]);
  }

  async function send(){
    if(!inp.trim()||busy)return;
    const txt=inp.trim();setInp('');setBusy(true);
    setMsgs(m=>[...m,{r:'u',t:txt,hint:null}]);
    const hist=msgs
      .filter(m=>m.t&&m.t.trim())
      .map(m=>({role:m.r==='a'?'assistant':'user',content:m.t}));
    hist.push({role:'user',content:txt});
    const raw=await ask(hist,getSys(),1000);
    const hm=raw.match(/HINT:\s*(.+?)(?=\n|$)/);
    const hint=hm?hm[1].trim():null;
    const reply=raw.replace(/\nHINT:.*$/m,'').trim();
    setMsgs(m=>[...m,{r:'a',t:reply||raw,hint}]);
    addStat('chatMsgs');setBusy(false);
  }

  async function finish(){
    if(msgs.length<3)return;
    setBusy(true);
    const tr=msgs.map(m=>`${m.r==='u'?myRole:aiRole}: ${m.t}`).join('\n');
    const r=await ask(
      [{role:'user',content:`Role-play transcript:\n${tr}\n\nGive detailed feedback on my ${lang}: grammar patterns, vocabulary, what went well, what to improve, and 3 key phrases for this scenario.`}],
      `You are a ${lang} language coach. Level: ${level}. Warm, specific, actionable feedback in English.`,1200
    );
    setFeedback(r);setBusy(false);
  }

  if(!active) return(
    <div className="sec">
      <div className="card">
        <h3>Role-Play Setup</h3>
        <p className="note" style={{marginBottom:11}}>Play your side of the conversation in {lang}. The AI plays the other character and gives you a grammar hint after each turn.</p>
        <div className="chips" style={{marginBottom:11}}>
          {PRESETS.map(p=><button key={p.s} className="chip" onClick={()=>{setScenario(p.s);setMyRole(p.u);setAiRole(p.a);setRegister(p.r);}}>{p.s}</button>)}
        </div>
        <div className="col" style={{gap:9}}>
          <div><div className="lbl">Scenario</div><input className="inp" value={scenario} onChange={e=>setScenario(e.target.value)} placeholder="Describe the situation…"/></div>
          <div className="g2">
            <div><div className="lbl">Your role</div><input className="inp" value={myRole} onChange={e=>setMyRole(e.target.value)} placeholder="e.g. Customer"/></div>
            <div><div className="lbl">AI plays</div><input className="inp" value={aiRole} onChange={e=>setAiRole(e.target.value)} placeholder="e.g. Waiter"/></div>
          </div>
          <div><div className="lbl">Register / tone</div><input className="inp" value={register} onChange={e=>setRegister(e.target.value)} placeholder="e.g. informal friendly"/></div>
        </div>
        <button className="btn btn-gd" style={{marginTop:13}} onClick={start} disabled={!scenario||!myRole||!aiRole}>Start Role-Play</button>
      </div>
    </div>
  );

  return(
    <div className="chat-wrap">
      <div style={{padding:'6px 13px',background:'var(--s3)',borderBottom:'1px solid var(--br)',fontSize:'.73rem',color:'var(--cr4)',flexShrink:0,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
        <span className="rp-badge">You: {myRole}</span>
        <span className="rp-badge bl">AI: {aiRole}</span>
        <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{scenario}</span>
      </div>
      <div className="chat-msgs">
        {msgs.map((m,i)=>(
          <div key={i} className="mwrap">
            <div className={`msg ${m.r}`}>
              <div className="mlbl">{m.r==='u'?myRole:aiRole}</div>
              <div className={`bbl ${m.r}`}>{m.t}</div>
            </div>
            {m.hint&&m.r==='a'&&i>0&&<div style={{alignSelf:'flex-start',maxWidth:'87%'}}><div className="card2" style={{marginTop:3,fontSize:'.75rem',color:m.hint.startsWith('✓')?'var(--gn3)':'var(--gd2)'}}>💡 {m.hint}</div></div>}
          </div>
        ))}
        {busy&&<div className="msg a"><div className="bbl a" style={{color:'var(--cr4)',fontStyle:'italic'}}>…</div></div>}
        <div ref={endRef}/>
      </div>
      {feedback&&<div className="fb bl" style={{margin:'0 13px 13px'}}>{feedback}</div>}
      <div className="chat-bar">
        <textarea className="chat-inp" value={inp} onChange={e=>setInp(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder={`Reply as ${myRole} in ${lang}…`} rows={1}/>
        <button className="btn btn-gh btn-sm" onClick={()=>{setActive(false);setMsgs([]);setFeedback(null);}}>↩ Reset</button>
        <button className="btn btn-gh btn-sm" onClick={finish} disabled={busy||msgs.length<3}>Finish</button>
        <button className="btn btn-gd" onClick={send} disabled={busy||!inp.trim()}>Send</button>
      </div>
    </div>
  );
}

// ─── SCENE TAB ────────────────────────────────────────────────────────
function SceneTab({lang,level,addStat}){
  const cfg=LANGS[lang];
  const [scene,setScene]=useState(SCENES[0]);
  const [mode,setMode]=useState('text');
  const [inp,setInp]=useState('');
  const [transcript,setTranscript]=useState('');
  const [recOn,setRecOn]=useState(false);
  const [feedback,setFeedback]=useState(null);
  const [busy,setBusy]=useState(false);
  const [timer,setTimer]=useState(SCENES[0].t);
  const [timerOn,setTimerOn]=useState(false);
  const tiRef=useRef(null);const recRef=useRef(null);

  function newScene(){
    const s=SCENES[Math.floor(Math.random()*SCENES.length)];
    setScene(s);setFeedback(null);setInp('');setTranscript('');setTimer(s.t);setTimerOn(false);
    clearInterval(tiRef.current);
  }

  useEffect(()=>{
    if(timerOn&&timer>0){
      tiRef.current=setInterval(()=>setTimer(t=>{if(t<=1){clearInterval(tiRef.current);setTimerOn(false);return 0;}return t-1;}),1000);
    }
    return()=>clearInterval(tiRef.current);
  },[timerOn]);

  function startRec(){
    if(!cfg.code){alert('Speech recognition unavailable for '+lang+'. Use text mode.');return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Chrome required for voice.');return;}
    const r=new SR();r.lang=cfg.code;r.continuous=true;r.interimResults=false;
    let pts=[];
    r.onresult=e=>pts.push(e.results[e.results.length-1][0].transcript);
    r.onend=()=>{setRecOn(false);setTranscript(pts.join(' '));};
    recRef.current=r;r.start();setRecOn(true);setTimer(scene.t);setTimerOn(true);
  }

  async function submit(){
    const txt=mode==='voice'?transcript:inp;
    if(!txt.trim())return;
    setBusy(true);
    const sys=`You are a ${lang} language tutor. Level: ${level}.${cfg.rom?' Include romanisation where helpful.':''}
Scene shown to student: "${scene.p}"
They described it in ${lang}. Evaluate their description:
1. Grammar and vocabulary corrections with correct forms
2. What they expressed well
3. Key vocabulary they could have used (${lang} + translation)
4. A model description at ${level} level
5. One focused tip for next time`;
    const r=await ask([{role:'user',content:`My description: "${txt}"`}],sys,1200);
    setFeedback(r);addStat('scenesCompleted');setBusy(false);
  }

  const mins=Math.floor(timer/60),secs=timer%60;
  const timeStr=mins>0?`${mins}:${String(secs).padStart(2,'0')}`:`${timer}s`;

  return(
    <div className="sec">
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="scene-art"><span>{scene.e}</span></div>
        <div style={{padding:'12px 15px'}}>
          <p style={{color:'var(--cr)',fontSize:'.88rem',lineHeight:1.58,marginBottom:9}}>{scene.p}</p>
          <div className="row" style={{fontSize:'.74rem',color:'var(--cr4)'}}>
            <span>⏱ {scene.t}s</span><span>✍️ ~{scene.w} words</span><span>🌐 in {lang}</span>
          </div>
        </div>
      </div>
      <div className="tgl-row">
        <button className={`tgl${mode==='text'?' on':''}`} onClick={()=>setMode('text')}>✍️ Text</button>
        <button className={`tgl${mode==='voice'?' on':''}`} onClick={()=>setMode('voice')}>🎙️ Voice</button>
      </div>
      {mode==='text'?(
        <div className="col">
          <div className="row">
            <div className="timer-lg">{timeStr}</div>
            {!timerOn&&<button className="btn btn-gh btn-sm" onClick={()=>{setTimer(scene.t);setTimerOn(true);}}>▶ Start timer</button>}
          </div>
          <textarea className="inp" value={inp} onChange={e=>setInp(e.target.value)} style={{minHeight:100}} placeholder={`Describe the scene in ${lang}…`}/>
        </div>
      ):(
        <div style={{textAlign:'center'}}>
          <div className="timer-lg">{timeStr}</div>
          <button className={`mic-btn${recOn?' on':''}`} onClick={recOn?()=>{recRef.current?.stop();clearInterval(tiRef.current);setTimerOn(false);}:startRec}>{recOn?'⏹':'🎙️'}</button>
          <p className="note" style={{marginTop:7}}>{recOn?'Recording… tap to stop':'Tap to record'}</p>
          {transcript&&<div className="fb" style={{marginTop:11,textAlign:'left',fontStyle:'italic'}}>{transcript}</div>}
        </div>
      )}
      <div className="row">
        <button className="btn btn-gd" onClick={submit} disabled={busy||(mode==='text'?!inp.trim():!transcript.trim())}>
          {busy?<><span className="spin"/> Checking…</>:'Get Feedback'}
        </button>
        <button className="btn btn-gh" onClick={newScene}>New Scene</button>
      </div>
      {feedback&&<div className="fb gn">{feedback}</div>}
    </div>
  );
}

// ─── CONVERSATIONS TAB ────────────────────────────────────────────────
function ConvoTab({lang,level,saved,setSaved}){
  const cfg=LANGS[lang];
  const [topic,setTopic]=useState('');
  const [speakers,setSpeakers]=useState('2');
  const [register,setRegister]=useState('informal');
  const [len,setLen]=useState('medium');
  const [showNotes,setShowNotes]=useState(true);
  const [showTl,setShowTl]=useState(true);
  const [blurred,setBlurred]=useState({});
  const [convo,setConvo]=useState(null);
  const [busy,setBusy]=useState(false);
  const [clarQ,setClarQ]=useState(null);
  const [clarA,setClarA]=useState('');
  const [viewing,setViewing]=useState(null);

  const EX=['a stressful work day','wife tells husband about her day; kitchen; informal','boss & employee in café; semi-formal','two friends catching up after months apart','phone call between siblings about family event','ordering food at a restaurant'];

  function getSys(){
    return `You are a ${lang} conversation writer and language teacher. Level: ${level}.
${cfg.rom?'Include romanisation in parentheses after each '+lang+' line.':''}
Output ONLY valid JSON with no markdown or extra text:
{"title":"","setting":"","lines":[{"speaker":"Name","text":"${lang} dialogue","translation":"English"}],"notes":[{"phrase":"grammar point","explanation":"explanation with alternatives"}],"needsClarification":null}
Length: ${len==='short'?'6–8':len==='long'?'16–20':'10–14'} lines. Register: ${register}.
Make dialogue natural with contractions and fillers. Notes should cover grammar specifics for ${lang}.
If the topic genuinely needs more context, set needsClarification to a question; otherwise null.`;
  }

  async function gen(extra=''){
    setBusy(true);setClarQ(null);setConvo(null);setBlurred({});
    const p=`Topic: ${topic}${extra?'\nContext: '+extra:''}\nSpeakers: ${speakers}\nLanguage: ${lang}`;
    const raw=await ask([{role:'user',content:p}],getSys(),2000);
    try{
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      if(parsed.needsClarification)setClarQ(parsed.needsClarification);
      else{setConvo(parsed);setSaved(s=>[{...parsed,id:Date.now(),lang,date:new Date().toLocaleDateString()},...s.slice(0,29)]);}
    }catch{setConvo({title:'Conversation',setting:'',lines:[{speaker:'Note',text:raw,translation:''}],notes:[]});}
    setBusy(false);
  }

  if(viewing){
    const c=saved.find(s=>s.id===viewing);
    if(!c){setViewing(null);return null;}
    return(
      <div className="sec">
        <div className="row"><button className="btn btn-gh btn-sm" onClick={()=>setViewing(null)}>← Back</button><span style={{color:'var(--cr4)',fontSize:'.76rem'}}>{c.lang} · {c.date}</span></div>
        <CvDisplay c={c} blurred={blurred} setBlurred={setBlurred} showNotes={showNotes} showTl={showTl}/>
      </div>
    );
  }

  return(
    <div className="sec">
      <div className="card">
        <h3>Build a Conversation</h3>
        <div className="chips" style={{marginBottom:9}}>{EX.map(e=><button key={e} className="chip" onClick={()=>setTopic(e)}>{e}</button>)}</div>
        <textarea className="inp" value={topic} onChange={e=>setTopic(e.target.value)} style={{minHeight:66}} placeholder={`Scenario, setting, characters, tone, specific ${lang} elements to practise…`}/>
        <div className="g2" style={{marginTop:9}}>
          {[['Speakers',[['2','2 speakers'],['3','3 speakers']],speakers,setSpeakers],
            ['Register',[['informal','Informal'],['semi-formal','Semi-formal'],['formal','Formal']],register,setRegister],
            ['Length',[['short','Short'],['medium','Medium'],['long','Long']],len,setLen]
          ].map(([label,opts,val,set])=>(
            <div key={label} className="col" style={{gap:3}}>
              <div className="lbl">{label}</div>
              <select className="inp" value={val} onChange={e=>set(e.target.value)}>{opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
            </div>
          ))}
          <div className="col" style={{gap:3}}>
            <div className="lbl">Show</div>
            <div className="row" style={{gap:5}}>
              <button className={`tgl${showNotes?' on':''}`} onClick={()=>setShowNotes(n=>!n)}>Notes</button>
              <button className={`tgl${showTl?' on':''}`} onClick={()=>setShowTl(t=>!t)}>Translations</button>
            </div>
          </div>
        </div>
        <button className="btn btn-gd" style={{marginTop:11}} onClick={()=>gen()} disabled={busy||!topic.trim()}>
          {busy?<><span className="spin"/> Generating…</>:'Generate'}
        </button>
      </div>
      {clarQ&&(
        <div className="card">
          <h4>One quick question</h4>
          <p className="note" style={{marginBottom:9}}>{clarQ}</p>
          <textarea className="inp" value={clarA} onChange={e=>setClarA(e.target.value)} style={{minHeight:56}} placeholder="Your answer…"/>
          <button className="btn btn-gd" style={{marginTop:7}} onClick={()=>gen(clarA)} disabled={busy}>Continue</button>
        </div>
      )}
      {convo&&<CvDisplay c={convo} blurred={blurred} setBlurred={setBlurred} showNotes={showNotes} showTl={showTl}/>}
      {saved.length>0&&(
        <div className="card">
          <h3>Saved Conversations</h3>
          <div className="col" style={{gap:5}}>
            {saved.slice(0,12).map(c=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 11px',background:'var(--s3)',borderRadius:7,cursor:'pointer',border:'1px solid var(--br)'}} onClick={()=>setViewing(c.id)}>
                <div><div style={{fontSize:'.86rem',color:'var(--cr)'}}>{c.title}</div><div style={{fontSize:'.69rem',color:'var(--cr4)'}}>{c.lang} · {c.date}</div></div>
                <span style={{color:'var(--gd)'}}>→</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function CvDisplay({c,blurred,setBlurred,showNotes,showTl}){
  return(
    <div className="card">
      <h3>{c.title}</h3>
      {c.setting&&<p className="note" style={{marginBottom:13}}>📍 {c.setting}</p>}
      {c.lines?.map((l,i)=>(
        <div key={i} className="cvline">
          <div className="spk">{l.speaker}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:'.88rem',color:'var(--cr)',lineHeight:1.58}}>{l.text}</div>
            {showTl&&l.translation&&<div className={`spk-tl${blurred[i]?' blur':''}`} onClick={()=>setBlurred(b=>({...b,[i]:!b[i]}))}>{blurred[i]?'▪ ▪ ▪':l.translation}</div>}
          </div>
        </div>
      ))}
      {showNotes&&c.notes?.length>0&&(
        <div className="notes-box">
          <h4 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'.92rem',color:'var(--gn3)',marginBottom:9}}>📝 Language Notes</h4>

}

// ─── GRAMMAR TAB ──────────────────────────────────────────────────────
function GrammarTab({lang,level,addStat}){
  const cfg=LANGS[lang];
  const [topic,setTopic]=useState('');
  const [custom,setCustom]=useState('');
  const [output,setOutput]=useState('');
  const [busy,setBusy]=useState(false);
  const [hist,setHist]=useState([]);
  const [fu,setFu]=useState('');

  function getSys(){
    return `You are an expert ${lang} grammar teacher. Level: ${level}.
${cfg.rom?'Include romanisation for all '+lang+' examples.':''}
Common learner errors: ${cfg.errors.join(', ')}.
Explain the grammar topic clearly. Include:
1. Core rule in plain language
2. When to use it / when NOT to use it
3. 4–5 graded examples: ${lang} + English translation${cfg.rom?' + romanisation':''}
4. Common mistakes and how to avoid them
5. Comparison with similar structures if relevant
6. Mini exercise: 3 items with answers below a separator line`;
  }

  async function explain(t){
    setBusy(true);setOutput('');setHist([]);
    const r=await ask([{role:'user',content:`Explain "${t}" in ${lang} to a ${level} learner.`}],getSys(),1600);
    setOutput(r);setHist([{role:'user',content:t},{role:'assistant',content:r}]);
    addStat('grammarTopics');setBusy(false);
  }

  async function followAsk(){
    if(!fu.trim())return;
    setBusy(true);
    const h=[...hist,{role:'user',content:fu}];
    const r=await ask(h,getSys(),1200);
    setHist([...h,{role:'assistant',content:r}]);
    setOutput(r);setFu('');setBusy(false);
  }

  return(
    <div className="sec">
      <div className="card">
        <h3>Grammar — {lang}</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
          {cfg.grammar.map(t=><button key={t} className={`g-chip${topic===t?' on':''}`} onClick={()=>{setTopic(t);explain(t);}}>{t}</button>)}
        </div>
        <div className="row" style={{marginTop:11}}>
          <input className="inp" style={{flex:1}} value={custom} onChange={e=>setCustom(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&custom.trim()){setTopic(custom);explain(custom);}}}
            placeholder="Or type any grammar topic…"/>
          <button className="btn btn-gd btn-sm" onClick={()=>{if(custom.trim()){setTopic(custom);explain(custom);}}} disabled={busy}>Go</button>
        </div>
      </div>
      {busy&&<div className="card" style={{textAlign:'center',color:'var(--cr4)',fontStyle:'italic'}}><span className="spin"/> &nbsp;Preparing explanation…</div>}
      {output&&!busy&&(
        <div className="card">
          <h3>{topic}</h3>
          <div className="g-out">{output}</div>
          <hr style={{border:'none',borderTop:'1px solid var(--br)',margin:'12px 0'}}/>
          <div className="row">
            <input className="inp" style={{flex:1}} value={fu} onChange={e=>setFu(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')followAsk();}}
              placeholder="Ask a follow-up question about this topic…"/>
            <button className="btn btn-gd btn-sm" onClick={followAsk} disabled={busy||!fu.trim()}>Ask</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── WORD BANK + SRS ──────────────────────────────────────────────────
function WordBankTab({lang,bank,setBank}){
  const [view,setView]=useState('bank');
  const [form,setForm]=useState({target:'',meaning:'',context:''});
  const [ridx,setRidx]=useState(0);
  const [showA,setShowA]=useState(false);

  const forLang=bank.filter(w=>w.lang===lang);
  const due=useMemo(()=>forLang.filter(isDue),[bank,lang]);

  useEffect(()=>{setRidx(0);setShowA(false);},[due.length,lang]);

  function addWord(){
    if(!form.target.trim())return;
    setBank(b=>[{id:Date.now(),lang,target:form.target.trim(),meaning:form.meaning.trim(),context:form.context.trim(),reps:0,interval:1,ef:2.5,nextReview:null},...b]);
    setForm({target:'',meaning:'',context:''});
  }

  function rate(q){
    const card=due[ridx];if(!card)return;
    const nxt=nextSRS(q,card.reps||0,card.interval||1,card.ef||2.5);
    const nd=new Date();nd.setDate(nd.getDate()+nxt.interval);
    setBank(b=>b.map(w=>w.id===card.id?{...w,...nxt,nextReview:nd.toISOString()}:w));
    if(ridx<due.length-1){setRidx(i=>i+1);setShowA(false);}
    else{setRidx(0);setShowA(false);setView('bank');}
  }

  const cur=due[ridx];

  return(
    <div className="sec">
      <div className="tgl-row">
        <button className={`tgl${view==='bank'?' on':''}`} onClick={()=>setView('bank')}>📚 Bank ({forLang.length})</button>
        <button className={`tgl${view==='review'?' on':''}`} onClick={()=>{setView('review');setRidx(0);setShowA(false);}}>
          🔁 Review {due.length>0?`(${due.length} due)`:'(none due)'}
        </button>
        <button className={`tgl${view==='add'?' on':''}`} onClick={()=>setView('add')}>＋ Add</button>
      </div>

      {view==='add'&&(
        <div className="card">
          <h3>Add a Word or Phrase</h3>
          <div className="col">
            <div><div className="lbl">Word / phrase in {lang}</div><input className="inp" value={form.target} onChange={e=>setForm(f=>({...f,target:e.target.value}))} placeholder="e.g. andare"/></div>
            <div><div className="lbl">Meaning</div><input className="inp" value={form.meaning} onChange={e=>setForm(f=>({...f,meaning:e.target.value}))} placeholder="e.g. to go"/></div>
            <div><div className="lbl">Example sentence (optional)</div><input className="inp" value={form.context} onChange={e=>setForm(f=>({...f,context:e.target.value}))} placeholder="A sentence using this word…"/></div>
            <button className="btn btn-gd" onClick={addWord} disabled={!form.target.trim()}>Add to Bank</button>
          </div>
        </div>
      )}

      {view==='review'&&(
        due.length===0?<div className="empty">🎉 Nothing due right now. Come back later!</div>:
        cur&&(
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:13}}>
              <h3>Review ({ridx+1} / {due.length})</h3>
            </div>
            <div className="wcard">
              <div className="w-tgt">{cur.target}</div>
              {cur.context&&<div className="w-ctx">{cur.context}</div>}
              {!showA?<button className="btn btn-gh" style={{marginTop:9,alignSelf:'flex-start'}} onClick={()=>setShowA(true)}>Reveal answer</button>:(
                <>
                  <div className="w-def" style={{marginTop:7}}>{cur.meaning||'(no translation saved)'}</div>
                  <div className="srs-row">
                    <button className="srs-b srs-again" onClick={()=>rate(1)}>Again</button>
                    <button className="srs-b srs-hard" onClick={()=>rate(3)}>Hard</button>
                    <button className="srs-b srs-good" onClick={()=>rate(4)}>Good</button>
                    <button className="srs-b srs-easy" onClick={()=>rate(5)}>Easy</button>
                  </div>
                  <div style={{fontSize:'.68rem',color:'var(--cr4)',marginTop:5}}>Again=tomorrow · Hard={Math.max(1,Math.round((cur.interval||1)*.5))}d · Good={cur.interval||1}d · Easy={Math.round((cur.interval||1)*(cur.ef||2.5))}d</div>
                </>
              )}
            </div>
          </div>
        )
      )}

      {view==='bank'&&(
        forLang.length===0?<div className="empty">No words saved for {lang} yet. Words saved from Chat, Voice, or added manually appear here.</div>:(

}

function VerbTab({lang,level,onSave}){
  const cfg=LANGS[lang];
  const TENSES={
    Italian:['Presente','Passato Prossimo','Imperfetto','Futuro Semplice','Condizionale','Congiuntivo Presente','Imperativo'],
    French:['Présent','Passé Composé','Imparfait','Futur Simple','Conditionnel','Subjonctif','Impératif'],
    Spanish:['Presente','Pretérito Indefinido','Imperfecto','Futuro','Condicional','Subjuntivo','Imperativo'],
    German:['Präsens','Perfekt','Präteritum','Futur I','Konjunktiv II','Imperativ'],
    'Brazilian Portuguese':['Presente','Pretérito Perfeito','Pretérito Imperfeito','Futuro','Condicional','Subjuntivo Presente','Imperativo'],
    Greek:['Present','Past Simple (Αόριστος)','Imperfect','Future (θα)','Subjunctive (να)','Imperative'],
    Latin:['Present','Imperfect','Future','Perfect','Pluperfect','Subjunctive Present','Subjunctive Imperfect'],
    Norwegian:['Present','Past (Preteritum)','Present Perfect','Future','Conditional','Imperative'],
    Korean:['Present (해요체)','Past (했어요)','Future (할 거예요)','Informal (해)','Formal (합니다)','Negative'],
    Japanese:['ます-form present','ます-form past','Plain present','Plain past','て-form','Negative','Potential','Conditional -たら'],
    Mandarin:['Basic present','Completed (了)','Ongoing (着)','Experienced (过)','Negation (不/没)','Potential complement'],
    Turkish:['Geniş zaman','Şimdiki zaman','Geçmiş zaman (-di)','Gelecek zaman (-ecek)','Dilek-koşul (-se)','Emir'],
  };
  const tenses=TENSES[lang]||TENSES.Italian;
  const [verb,setVerb]=useState('');
  const [tense,setTense]=useState(tenses[0]);
  const [output,setOutput]=useState(null);
  const [sentences,setSentences]=useState([]);
  const [busy,setBusy]=useState(false);
  const [busySent,setBusySent]=useState(false);
  const [showTl,setShowTl]=useState({});

  async function conjugate(){
    if(!verb.trim())return;
    setBusy(true);setOutput(null);setSentences([]);
    const sys=`You are a ${lang} grammar expert.${cfg.rom?' Include romanisation in parentheses.':''}
Output ONLY valid JSON:
{"verb":"","meaning":"English meaning","tense":"","forms":[{"pronoun":"","form":"","romanisation":""}],"notes":"irregularities or special notes"}
Include all persons/numbers for ${lang}. For languages without grammatical persons, adapt appropriately.`;
    const r=await ask([{role:'user',content:`Conjugate the ${lang} verb "${verb}" in the ${tense} tense.`}],sys,800);
    try{setOutput(JSON.parse(r.replace(/```json|```/g,'').trim()));}
    catch{setOutput({verb,meaning:'',tense,forms:[],notes:r});}
    setBusy(false);
  }

  async function mineSentences(){
    setBusySent(true);setSentences([]);setShowTl({});
    const sys=`You are a ${lang} language teacher. Level: ${level}.${cfg.rom?' Include romanisation in parentheses.':''}
Output ONLY valid JSON:
[{"sentence":"${lang} sentence","translation":"English","note":"grammar or usage note"}]`;
    const r=await ask([{role:'user',content:`Generate 6 natural ${lang} sentences using the verb "${verb}" in different tenses and contexts.`}],sys,1000);
    try{setSentences(JSON.parse(r.replace(/```json|```/g,'').trim()));}
    catch{setSentences([{sentence:r,translation:'',note:''}]);}
    setBusySent(false);
  }

  return(
    <div className="sec">
      <div className="card">
        <h3>Verb Conjugation & Sentence Mining</h3>
        <div className="row">
          <input className="inp" style={{flex:1}} value={verb} onChange={e=>setVerb(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')conjugate();}}
            placeholder={`Enter a ${lang} verb…`}/>
          <select className="inp" style={{flex:1}} value={tense} onChange={e=>setTense(e.target.value)}>
            {tenses.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
          <button className="btn btn-gd" onClick={conjugate} disabled={busy||!verb.trim()}>
            {busy?<span className="spin"/>:'Conjugate'}
          </button>
        </div>
      </div>

      {output&&(
        <div className="card">
          <h3>{output.verb} <span style={{color:'var(--cr3)',fontSize:'.8rem',fontWeight:400}}>— {output.meaning}</span></h3>
          <div style={{fontSize:'.76rem',color:'var(--gd)',fontFamily:"'DM Mono',monospace",marginBottom:9}}>{output.tense}</div>
          {output.forms?.length>0&&(
            <table className="conj-table">
              <thead><tr><th>Person</th><th>Form</th>{cfg.rom&&<th>Romanisation</th>}</tr></thead>
              <tbody>{output.forms.map((f,i)=>(
                <tr key={i}>
                  <td style={{color:'var(--cr3)'}}>{f.pronoun}</td>
                  <td className="tgt">{f.form}</td>
                  {cfg.rom&&<td style={{fontFamily:"'DM Mono',monospace",fontSize:'.78rem',color:'var(--cr4)'}}>{f.romanisation}</td>}
                </tr>
              ))}</tbody>
            </table>
          )}
          {output.notes&&<p className="note" style={{marginTop:9,color:'var(--gd2)'}}>{output.notes}</p>}
          <div className="row" style={{marginTop:11}}>
            <button className="btn btn-gh btn-sm" onClick={mineSentences} disabled={busySent}>
              {busySent?<><span className="spin"/> Loading…</>:'⛏ Mine sentences'}
            </button>
            <button className="save-btn" onClick={()=>onSave({target:output.verb,meaning:output.meaning,context:`${output.tense}: ${output.forms?.map(f=>f.form).join(', ')}`,lang})}>＋ Save to Bank</button>
          </div>
        </div>
      )}

      {sentences.length>0&&(
        <div className="card">
          <h3>Example Sentences — "{verb}"</h3>
          {sentences.map((s,i)=>(
            <div key={i} className="mine-card">
              <div className="mine-sent">{s.sentence}</div>
              <div className="mine-tl" style={{filter:showTl[i]?'none':'blur(3px)'}} onClick={()=>setShowTl(t=>({...t,[i]:!t[i]}))}>
                {showTl[i]?s.translation:'▪ click to reveal ▪'}
              </div>
              {s.note&&<div className="mine-note">{s.note}</div>}
              <button className="save-btn" onClick={()=>onSave({target:s.sentence,meaning:s.translation,context:verb,lang})}>＋ Save</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── LISTENING TAB ────────────────────────────────────────────────────
function ListeningTab({lang,level,onSave}){
  const cfg=LANGS[lang];
  const [script,setScript]=useState('');
  const [segs,setSegs]=useState(null);
  const [busy,setBusy]=useState(false);
  const [showTl,setShowTl]=useState({});
  const [notes,setNotes]=useState(null);
  const [busyN,setBusyN]=useState(false);
  const [q,setQ]=useState('');
  const [ans,setAns]=useState(null);
  const [busyQ,setBusyQ]=useState(false);

  async function process(){
    if(!script.trim())return;
    setBusy(true);setSegs(null);setNotes(null);setShowTl({});
    const sys=`You are a ${lang} language teacher. Level: ${level}.${cfg.rom?' Include romanisation in parentheses.':''}
Break this ${lang} script into natural segments (1–3 sentences each).
Output ONLY valid JSON:
[{"original":"${lang} text","translation":"English translation","romanisation":"if applicable else empty string"}]`;
    const r=await ask([{role:'user',content:script}],sys,2000);
    try{setSegs(JSON.parse(r.replace(/```json|```/g,'').trim()));}
    catch{setSegs([{original:script,translation:'',romanisation:''}]);}
    setBusy(false);
  }

  async function analyse(){
    setBusyN(true);
    const sys=`You are a ${lang} language teacher. Level: ${level}.
Analyse this ${lang} script and provide:
1. Key vocabulary (5–8 items worth noting with translations)
2. Notable grammar structures
3. Cultural or contextual notes
4. 3 comprehension questions (in ${lang})`;
    const r=await ask([{role:'user',content:`Script: ${script}`}],sys,1200);
    setNotes(r);setBusyN(false);
  }

  async function askQ(){
    if(!q.trim())return;
    setBusyQ(true);setAns(null);
    const r=await ask([{role:'user',content:`Script: "${script}"\n\nQuestion: ${q}`}],
      `You are a ${lang} language teacher helping a ${level} learner understand a script. Answer clearly in English.`,800);
    setAns(r);setBusyQ(false);
  }

  function speak(text){
    if(!cfg.code||!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.lang=cfg.code;u.rate=0.85;
    window.speechSynthesis.speak(u);
  }

  return(
    <div className="sec">
      <div className="card">
        <h3>Listening & Script Study</h3>
        <p className="note" style={{marginBottom:9}}>Paste a script from a TED talk, podcast, film, or YouTube video. The app segments it, translates it, and lets you analyse the language.</p>
        <textarea className="inp" value={script} onChange={e=>setScript(e.target.value)} style={{minHeight:100}} placeholder={`Paste your ${lang} script here…`}/>
        <div className="row" style={{marginTop:9}}>
          <button className="btn btn-gd" onClick={process} disabled={busy||!script.trim()}>
            {busy?<><span className="spin"/> Processing…</>:'Process Script'}
          </button>
          <button className="btn btn-bl" onClick={analyse} disabled={busyN||!script.trim()}>
            {busyN?<><span className="spin"/> Analysing…</>:'📊 Analyse Language'}
          </button>
        </div>
      </div>

      {segs&&segs.length>0&&(
        <div className="card">
          <h3>Script — {segs.length} segments</h3>
          {segs.map((seg,i)=>(
            <div key={i} className="seg">
              <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:'.88rem',color:'var(--cr)',lineHeight:1.58}}>{seg.original}</div>
                  {cfg.rom&&seg.romanisation&&<div style={{fontSize:'.74rem',color:'var(--cr4)',fontFamily:"'DM Mono',monospace",marginTop:2}}>{seg.romanisation}</div>}
                  <div className={`seg-tl${showTl[i]?'':' blur'}`} onClick={()=>setShowTl(t=>({...t,[i]:!t[i]}))}>
                    {showTl[i]?seg.translation:'▪ click to reveal ▪'}
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}}>
                  {cfg.code&&<button className="btn btn-gh btn-sm" style={{padding:'2px 7px'}} onClick={()=>speak(seg.original)}>🔊</button>}
                  <button className="save-btn" onClick={()=>onSave({target:seg.original,meaning:seg.translation,context:'Listening script',lang})}>＋</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {notes&&<div className="fb bl">{notes}</div>}

      {segs&&(
        <div className="card">
          <h4>Ask about the script</h4>
          <div className="row">
            <input className="inp" style={{flex:1}} value={q} onChange={e=>setQ(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')askQ();}}
              placeholder="What does this phrase mean? Why is this tense used?…"/>
            <button className="btn btn-gd btn-sm" onClick={askQ} disabled={busyQ||!q.trim()}>Ask</button>
          </div>
          {ans&&<div className="fb" style={{marginTop:9}}>{ans}</div>}
        </div>
      )}
    </div>
  );
}

// ─── SHADOWING TAB ────────────────────────────────────────────────────
function ShadowingTab({lang,level,addStat}){
  const cfg=LANGS[lang];
  const [text,setText]=useState('');
  const [loading,setLoading]=useState(false);
  const [rec,setRec]=useState(false);
  const [transcript,setTranscript]=useState('');
  const [feedback,setFeedback]=useState(null);
  const [busy,setBusy]=useState(false);
  const [speed,setSpeed]=useState('0.85');
  const recRef=useRef(null);

  const PROMPTS=['a weather forecast','a restaurant announcement','a phone voicemail','a short news headline with context','a short story paragraph','directions in a city'];

  async function loadPassage(prompt){
    setLoading(true);setFeedback(null);setTranscript('');
    const r=await ask(
      [{role:'user',content:`Write a short ${lang} passage (4–6 sentences, ${level} level) for shadowing practice. Theme: ${prompt}.${cfg.rom?' Include romanisation in parentheses.':''} Output the passage only.`}],
      `You are a ${lang} language teacher. Write natural spoken-register text only.`,500
    );
    setText(r.startsWith('⚠')?'':r.trim());setLoading(false);
  }

  function speak(){
    if(!cfg.code||!window.speechSynthesis||!text)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.lang=cfg.code;u.rate=parseFloat(speed);
    window.speechSynthesis.speak(u);
  }

  function startRec(){
    if(!cfg.code){alert('Speech recognition unavailable for '+lang+'. Type your attempt below.');return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Chrome required.');return;}
    const r=new SR();r.lang=cfg.code;r.continuous=true;r.interimResults=false;
    let pts=[];
    r.onresult=e=>pts.push(e.results[e.results.length-1][0].transcript);
    r.onend=()=>{setRec(false);setTranscript(pts.join(' '));};
    recRef.current=r;r.start();setRec(true);setFeedback(null);
  }

  async function getFeedback(){
    setBusy(true);
    const sys=`You are an expert ${lang} accent and pronunciation coach. Level: ${level}.
Pronunciation notes: ${cfg.pron}
Target text: "${text}"
Learner produced: "${transcript||'(unclear)'}"
Provide:
1. Accuracy compared to target
2. Specific pronunciation points to improve (relevant to ${lang})
3. Intonation and rhythm feedback
4. Accent reduction tips
5. Score out of 10 with brief justification`;
    const r=await ask([{role:'user',content:'Analyse my shadowing attempt.'}],sys,1000);
    setFeedback(r);addStat('voiceSessions');setBusy(false);
  }

  return(
    <div className="sec">
      <div className="card">
        <h3>Shadowing & Accent Practice</h3>
        <p className="note" style={{marginBottom:9}}>Listen to a passage, shadow along with it (speak simultaneously), record yourself, and get accent feedback.</p>
        <div className="chips" style={{marginBottom:9}}>
          {PROMPTS.map(p=><button key={p} className="chip" onClick={()=>loadPassage(p)} disabled={loading}>{loading?'…':p}</button>)}
        </div>
        {text&&<div className="phrase-box" style={{textAlign:'left',lineHeight:1.7,marginBottom:11}}>{text}</div>}
        <div className="row">
          <select className="inp" style={{width:120,flex:'none'}} value={speed} onChange={e=>setSpeed(e.target.value)}>
            <option value="0.6">Slow (0.6×)</option>
            <option value="0.75">0.75×</option>
            <option value="0.85">Normal (0.85×)</option>
            <option value="1.0">Fast (1×)</option>
          </select>
          <button className="btn btn-gh btn-sm" onClick={speak} disabled={!cfg.code||!text}>🔊 Play</button>
          <button className="btn btn-gh btn-sm" onClick={()=>window.speechSynthesis?.cancel()}>⏹ Stop</button>
        </div>
        {!cfg.code&&<p className="note" style={{marginTop:7,color:'var(--rs3)'}}>TTS unavailable for {lang}. Use an external source and shadow along.</p>}
      </div>
      <div className="card">
        <h3>Record Your Shadowing</h3>
        <button className={`mic-btn${rec?' on':''}`} onClick={rec?()=>recRef.current?.stop():startRec}>{rec?'⏹':'🎙️'}</button>
        <p className="note" style={{textAlign:'center',marginTop:7}}>{rec?'Recording… tap to stop':'Tap to record yourself'}</p>
        <textarea className="inp" style={{marginTop:11,minHeight:52}} value={transcript} onChange={e=>setTranscript(e.target.value)} placeholder="Transcript appears here, or type what you said…"/>
        <button className="btn btn-gd" style={{marginTop:9}} onClick={getFeedback} disabled={busy||!transcript.trim()||!text}>
          {busy?<><span className="spin"/> Analysing…</>:'Get Accent Feedback'}
        </button>
      </div>
      {feedback&&<div className="fb pu">{feedback}</div>}
    </div>
  );
}

        <div className="stat-g">
          {[[ls.chatMsgs,'Messages sent'],[ls.corrections,'Corrections'],[ls.voiceSessions,'Voice sessions'],[ls.scenesCompleted,'Scenes done'],[ls.grammarTopics,'Grammar topics'],[forLang.length,'Words saved'],[due.length,'Due for review'],[stats.streak||0,'Day streak 🔥']].map(([n,l])=>(
            <div key={l} className="stat-box"><div className="stat-n">{n}</div><div className="stat-l">{l}</div></div>
          ))}
        </div>
      </div>
      {forLang.length>0&&(
        <div className="card">
          <h4>Word Bank — {lang} · {level}</h4>
          <div className="col" style={{gap:5}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'.76rem',color:'var(--cr4)'}}><span>SRS progress</span><span>{reviewed} / {forLang.length}</span></div>
            <div className="pb-wrap"><div className="pb" style={{width:forLang.length>0?`${(reviewed/forLang.length)*100}%`:'0%'}}/></div>
            {due.length>0&&<p className="note" style={{color:'var(--gd2)'}}>🔁 {due.length} word{due.length>1?'s':''} ready for review.</p>}
          </div>
        </div>
      )}
      <div className="card">
        <h4>All Languages</h4>
        {bank.length===0?<p className="note">No words saved yet.</p>:(
          <div className="col" style={{gap:6}}>
            {LANG_NAMES.map(l=>{const n=bank.filter(w=>w.lang===l).length;const d=bank.filter(w=>w.lang===l&&isDue(w)).length;return n>0?(
              <div key={l} style={{display:'flex',alignItems:'center',gap:9}}>
                <span>{LANGS[l].flag}</span>
                <span style={{flex:1,fontSize:'.83rem',color:'var(--cr2)'}}>{l}</span>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:'.76rem',color:'var(--gd)'}}>{n} words</span>
                {d>0&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:'.68rem',color:'var(--rs3)'}}>{d} due</span>}
              </div>
            ):null;}).filter(Boolean)}
          </div>
        )}
      </div>
      {allDue.length>0&&<div className="card" style={{borderLeftColor:'var(--gd)',borderLeftWidth:3}}><p className="note" style={{color:'var(--gd2)'}}>📚 {allDue.length} word{allDue.length>1?'s':''} due across all languages.</p></div>}
    </div>
  );
}

// ─── ACCOUNTABILITY TAB ───────────────────────────────────────────────
function TodayTab({lang,level,stats,setStats,bank}){
  const today=new Date().toDateString();
  const todayKey=`ci_${today}`;
  const [checked,setChecked]=useState(()=>S.get(todayKey,{}));
  const [refl,setRefl]=useState('');
  const [coach,setCoach]=useState('');
  const [busy,setBusy]=useState(false);

  const TASKS=[
    {id:'chat',label:'Chat practice (written conversation)',icon:'💬'},
    {id:'voice',label:'Voice / pronunciation practice',icon:'🎙️'},
    {id:'shadow',label:'Shadowing / accent exercise',icon:'🔄'},
    {id:'scene',label:'Daily scene description',icon:'🖼️'},
    {id:'grammar',label:'Grammar study (one topic)',icon:'📖'},
    {id:'review',label:'Word bank SRS review',icon:'🔁'},
    {id:'listen',label:'Listening & script study',icon:'🎧'},
    {id:'verb',label:'Verb conjugation & sentence mining',icon:'⛏'},
    {id:'mine',label:'Freestyle sentence mining',icon:'🗂'},
    {id:'convo',label:'Build / study a conversation',icon:'📜'},
    {id:'roleplay',label:'Role-play practice',icon:'🎭'},
  ];

  const weekData=useMemo(()=>{
    const days=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const data=S.get(`ci_${d.toDateString()}`,{});
      days.push({label:d.toLocaleDateString('en',{weekday:'short'}),count:Object.values(data).filter(Boolean).length});
    }
    return days;
  },[]);

  function toggle(id){
    const n={...checked,[id]:!checked[id]};
    setChecked(n);S.set(todayKey,n);
    // Update streak
    const count=Object.values(n).filter(Boolean).length;
    if(count>0){
      setStats(s=>{
        let streak=s.streak||0;
        if(s.lastSession!==today){
          const yest=new Date();yest.setDate(yest.getDate()-1);
          streak=s.lastSession===yest.toDateString()?streak+1:1;
        }
        return{...s,streak,lastSession:today};
      });
    }
  }

  async function getCoach(){
    setBusy(true);
    const done=TASKS.filter(t=>checked[t.id]).map(t=>t.label).join(', ')||'none yet';
    const r=await ask(
      [{role:'user',content:`I'm learning ${lang} at ${level} level. Today I completed: ${done}. My reflection: "${refl}". Give me a short, warm, encouraging response (3–4 sentences) with one specific tip for tomorrow.`}],
      'You are a warm, encouraging language learning coach. Be specific and motivating.',600
    );
    setCoach(r);setBusy(false);
  }

  const done=Object.values(checked).filter(Boolean).length;
  const pct=Math.round((done/TASKS.length)*100);

  return(
    <div className="sec">
      <div className="card">
        <h3>Today — {lang} · {level}</h3>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:13}}>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'2.2rem',color:pct===100?'var(--gn2)':'var(--gd2)',lineHeight:1}}>{pct}%</div>
            <div style={{fontSize:'.7rem',color:'var(--cr4)'}}>{done}/{TASKS.length} tasks · {new Date().toLocaleDateString('en',{weekday:'long',month:'short',day:'numeric'})}</div>
          </div>
          <div style={{flex:1}}>
            <div className="pb-wrap"><div className="pb" style={{width:`${pct}%`,background:pct===100?'linear-gradient(90deg,var(--gn),var(--gn2))':undefined}}/></div>
            {(stats.streak||0)>0&&<div style={{fontSize:'.74rem',color:'var(--gd3)',marginTop:5}}>🔥 {stats.streak} day streak</div>}
          </div>
        </div>
        <div className="col" style={{gap:6}}>
          {TASKS.map(t=>(
            <div key={t.id} className={`ci-item${checked[t.id]?' done':''}`} onClick={()=>toggle(t.id)}>
              <div className="ci-check">{checked[t.id]?'✓':''}</div>
              <div className="ci-label">{t.icon} {t.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <h4>7-Day Activity</h4>
        <div style={{display:'flex',gap:6,alignItems:'flex-end',height:60}}>
          {weekData.map((d,i)=>(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div style={{width:'100%',background:d.count>0?'var(--gd)':'var(--s4)',borderRadius:4,height:`${Math.max(4,d.count/TASKS.length*52)}px`,transition:'height .3s'}}/>
              <div style={{fontSize:'.62rem',color:'var(--cr4)',fontFamily:"'DM Mono',monospace"}}>{d.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <h4>Today's Reflection</h4>
        <textarea className="inp" value={refl} onChange={e=>setRefl(e.target.value)} style={{minHeight:70}} placeholder="What went well? What was difficult? What will you focus on tomorrow?…"/>
        <button className="btn btn-gd btn-sm" style={{marginTop:8}} onClick={getCoach} disabled={busy||!refl.trim()}>
          {busy?<><span className="spin"/> Thinking…</>:'Get coach feedback'}
        </button>
        {coach&&<div className="fb tl" style={{marginTop:9}}>{coach}</div>}
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────
const TABS=[
  {id:'today',    icon:'✅', label:'Today'},
  {id:'chat',     icon:'💬', label:'Chat'},
  {id:'voice',    icon:'🎙️', label:'Voice'},
  {id:'roleplay', icon:'🎭', label:'Role-Play'},
  {id:'scene',    icon:'🖼️', label:'Scene'},
  {id:'convo',    icon:'📜', label:'Conversations'},
  {id:'grammar',  icon:'📖', label:'Grammar'},
  {id:'verbs',    icon:'⛏',  label:'Verbs'},
  {id:'mine',     icon:'🗂',  label:'Mine'},
  {id:'listen',   icon:'🎧', label:'Listening'},
  {id:'shadow',   icon:'🔄', label:'Shadowing'},
  {id:'wordbank', icon:'🃏', label:'Word Bank'},
  {id:'questions',icon:'❓', label:'Questions'},
  {id:'progress', icon:'📊', label:'Progress'},
];

const DEF_STATS={perKey:{},streak:0,lastSession:null};

function App(){
  const [tab,setTab]=useState('today');
  const [lang,setLang]=useState(()=>S.get('cv_lang','Italian'));
  const [level,setLevel]=useState(()=>S.get('cv_level','B1'));
  const [showLM,setShowLM]=useState(false);
  const [bank,setRawBank]=useState(()=>S.get('cv_bank',[]));
  const [convos,setRawConvos]=useState(()=>S.get('cv_convos',[]));
  const [stats,setRawStats]=useState(()=>S.get('cv_stats',DEF_STATS));

  const setBank=useCallback(fn=>{setRawBank(b=>{const n=typeof fn==='function'?fn(b):fn;S.set('cv_bank',n);return n;});},[]);
  const setConvos=useCallback(fn=>{setRawConvos(b=>{const n=typeof fn==='function'?fn(b):fn;S.set('cv_convos',n);return n;});},[]);
  const setStats=useCallback(fn=>{setRawStats(b=>{const n=typeof fn==='function'?fn(b):fn;S.set('cv_stats',n);return n;});},[]);

  function addStat(key){
    const sk=`${lang}::${level}`;
    setStats(s=>{
      const cur=s.perKey?.[sk]||{chatMsgs:0,corrections:0,voiceSessions:0,scenesCompleted:0,grammarTopics:0};
      const today=new Date().toDateString();
      let streak=s.streak||0;
      if(s.lastSession!==today){
        const yest=new Date();yest.setDate(yest.getDate()-1);
        streak=s.lastSession===yest.toDateString()?streak+1:1;
      }
      return{...s,perKey:{...s.perKey,[sk]:{...cur,[key]:(cur[key]||0)+1}},lastSession:today,streak};
    });
  }

  function onSaveWord(w){setBank(b=>[{id:Date.now(),...w,reps:0,interval:1,ef:2.5,nextReview:null},...b]);}
  function saveLang(l,lv){setLang(l);setLevel(lv);S.set('cv_lang',l);S.set('cv_level',lv);setShowLM(false);}

  const cfg=LANGS[lang]||LANGS.Italian;
  const due=bank.filter(w=>w.lang===lang&&isDue(w));

  return(
    <>
      <style>{CSS}</style>
      <div className="app">
        <header className="hdr">
          <div><div className="logo">Conversazioni</div><div className="logo-sub">language through conversation</div></div>
          <div className="hdr-r">
            {due.length>0&&<span className="badge" style={{color:'var(--rs3)',borderColor:'var(--rs)'}}>🔁{due.length}</span>}
            {(stats.streak||0)>0&&<span className="badge" style={{color:'var(--gd3)'}}>🔥{stats.streak}</span>}
            <button className="lang-pill" onClick={()=>setShowLM(true)}>
              <span>{cfg.flag}</span>{lang}
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:'.7rem',opacity:.7}}>{level}</span>
            </button>
          </div>
        </header>
        <nav className="tabs">
          {TABS.map(t=>(
            <button key={t.id} className={`tb${tab===t.id?' on':''}`} onClick={()=>setTab(t.id)}>
              {t.icon} {t.label}
              {t.id==='wordbank'&&due.length>0&&<span className="notif">{due.length}</span>}
            </button>
          ))}
        </nav>
        <div className="content">
          {tab==='today'    &&<TodayTab       key={lang+level} lang={lang} level={level} stats={stats} setStats={setStats} bank={bank}/>}
          {tab==='chat'     &&<ChatTab        key={lang+level} lang={lang} level={level} onSave={onSaveWord} addStat={addStat}/>}
          {tab==='voice'    &&<VoiceTab       key={lang+level} lang={lang} level={level} onSave={onSaveWord} addStat={addStat}/>}
          {tab==='roleplay' &&<RolePlayTab    key={lang+level} lang={lang} level={level} addStat={addStat}/>}
          {tab==='scene'    &&<SceneTab       key={lang+level} lang={lang} level={level} addStat={addStat}/>}
          {tab==='convo'    &&<ConvoTab       key={lang}       lang={lang} level={level} saved={convos} setSaved={setConvos}/>}
          {tab==='grammar'  &&<GrammarTab     key={lang+level} lang={lang} level={level} addStat={addStat}/>}
          {tab==='verbs'    &&<VerbTab        key={lang+level} lang={lang} level={level} onSave={onSaveWord}/>}
          {tab==='mine'     &&<MineTab        key={lang+level} lang={lang} level={level} onSave={onSaveWord}/>}
          {tab==='listen'   &&<ListeningTab   key={lang+level} lang={lang} level={level} onSave={onSaveWord}/>}
          {tab==='shadow'   &&<ShadowingTab   key={lang+level} lang={lang} level={level} addStat={addStat}/>}
          {tab==='wordbank' &&<WordBankTab    key={lang}       lang={lang} bank={bank} setBank={setBank}/>}
          {tab==='questions'&&<QuestionsTab   key={lang+level} lang={lang} level={level}/>}
          {tab==='progress' &&<ProgressTab    lang={lang} level={level} stats={stats} bank={bank}/>}
        </div>
        {showLM&&<LangModal lang={lang} level={level} onSave={saveLang}/>}
      </div>
    </>
  );
}

// Expose mountApp — called after key is confirmed
window.mountApp = function(){
  try {
    document.getElementById('setup').style.display = 'none';
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  } catch(e) {
    document.getElementById('setup').style.display = 'flex';
    alert('Error loading app: ' + e.message);
  }
};
</script>
</body>
</html>
